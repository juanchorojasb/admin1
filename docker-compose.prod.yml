version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: avn_postgres
    restart: always
    environment:
      POSTGRES_DB: aves_naturaleza
      POSTGRES_USER: avn_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avn_user -d aves_naturaleza"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: avn_redis
    restart: always
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: avn_api
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://avn_user:${DB_PASSWORD}@postgres:5432/aves_naturaleza
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 4000
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: avn_dashboard
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
      NEXT_PUBLIC_APP_NAME: Aves y Naturaleza
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: avn_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infra/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - dashboard
      - api

volumes:
  postgres_data:
  redis_data:
